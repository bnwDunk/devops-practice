services:
  frontend:
    build:
      target: dev
    volumes:
      - ./apps/frontend:/workspace/apps/frontend
      - /workspace/apps/frontend/node_modules
    ports:
      - "5173:5173"
    command: npm run dev --workspace apps/frontend

  backend:
    build:
      target: dev
    volumes:
      - ./apps/backend:/workspace/apps/backend
      - /workspace/apps/backend/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MYSQL_HOST: mysql
    command: npm run dev --workspace apps/backend
