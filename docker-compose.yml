name: devops-practice-stack

services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./infra/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge
      - app
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    expose:
      - "80"
    networks:
      - app
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 3000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-devops_practice}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app_password_change_me}
      APP_VERSION: ${APP_VERSION:-local}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 8
      start_period: 20s
    networks:
      - app
      - data
    restart: unless-stopped

  mysql:
    build:
      context: .
      dockerfile: infra/mysql/Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-devops_practice}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app_password_change_me}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} $${MYSQL_DATABASE} -e 'SELECT COUNT(*) FROM deployments;' --silent --skip-column-names"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    networks:
      - data
    restart: unless-stopped

  adminer:
    image: adminer:4
    profiles:
      - tools
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.1.0
    profiles:
      - observability
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - app
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - observability
    restart: unless-stopped

  jenkins:
    build:
      context: .
      dockerfile: infra/jenkins/Dockerfile
    profiles:
      - ci
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci
    restart: unless-stopped

networks:
  edge:
  app:
  data:
  observability:
  ci:

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
  jenkins-data:
